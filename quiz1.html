<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Викторина: Ирина Одоевцева</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .container {
    width: 100%;
    max-width: 900px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 10px;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    background: linear-gradient(135deg, #ffffff, #f0f0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    font-size: 1.1rem;
    opacity: 0.9;
    margin-bottom: 40px;
  }

  h2 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 30px;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }

  .levels {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 24px;
    margin-top: 30px;
  }

  .level-card {
    padding: 40px 25px;
    border-radius: 20px;
    cursor: pointer;
    text-align: center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: 2px solid rgba(255, 255, 255, 0.3);
    position: relative;
    overflow: hidden;
  }

  .level-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .level-card:hover::before {
    opacity: 1;
  }

  .level-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    border-color: rgba(255, 255, 255, 0.6);
  }

  .level-easy { background: linear-gradient(135deg, #43e97b, #38f9d7); }
  .level-medium { background: linear-gradient(135deg, #fa709a, #fee140); }
  .level-hard { background: linear-gradient(135deg, #f5576c, #a855f7); }

  .level-card .emoji {
    font-size: 3.5rem;
    margin-bottom: 15px;
    display: block;
    position: relative;
    z-index: 1;
  }

  .level-card .level-name {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .level-card .level-count {
    font-size: 0.95rem;
    opacity: 0.95;
    position: relative;
    z-index: 1;
  }

  .questions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 15px;
    margin: 30px 0;
  }

  .question-btn {
    aspect-ratio: 1;
    border: 2px solid rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border-radius: 16px;
    font-size: 1.5rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .question-btn:hover {
    transform: translateY(-4px) scale(1.05);
    background: rgba(255, 255, 255, 0.25);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
  }

  .question-btn.answered-correct {
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    border-color: #43e97b;
    box-shadow: 0 0 20px rgba(67, 233, 123, 0.5);
  }

  .question-btn.answered-wrong {
    background: linear-gradient(135deg, #f5576c, #f093fb);
    border-color: #f5576c;
    box-shadow: 0 0 20px rgba(245, 87, 108, 0.5);
  }

  .question-btn.answered-timeout {
    background: linear-gradient(135deg, #868f96, #596164);
    border-color: #868f96;
  }

  .question-btn .check-mark {
    position: absolute;
    top: 5px;
    right: 8px;
    font-size: 0.9rem;
  }

  .back-btn {
    display: block;
    margin: 30px auto 0;
    padding: 14px 32px;
    font-size: 1rem;
    font-weight: 600;
    border: 2px solid rgba(255, 255, 255, 0.4);
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }

  .back-btn:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
  }

  .question-text {
    font-size: 1.5rem;
    line-height: 1.5;
    margin-bottom: 30px;
    padding: 25px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    border-left: 5px solid rgba(255, 255, 255, 0.7);
  }

  .timer-container {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
    gap: 15px;
  }

  .timer-circle {
    position: relative;
    width: 80px;
    height: 80px;
  }

  .timer-circle svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .timer-circle circle {
    fill: none;
    stroke-width: 6;
  }

  .timer-bg {
    stroke: rgba(255, 255, 255, 0.2);
  }

  .timer-progress {
    stroke: #43e97b;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  .timer-progress.warning { stroke: #fee140; }
  .timer-progress.danger { stroke: #f5576c; }

  .timer-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.8rem;
    font-weight: 700;
  }

  .answers {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .answer-btn {
    padding: 20px 25px;
    background: rgba(255, 255, 255, 0.12);
    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 16px;
    color: #fff;
    font-size: 1.05rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 15px;
    line-height: 1.4;
  }

  .answer-btn:not(:disabled):hover {
    background: rgba(255, 255, 255, 0.25);
    transform: translateX(8px);
    border-color: rgba(255, 255, 255, 0.5);
  }

  .answer-btn .letter {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    min-width: 40px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    font-weight: 700;
    font-size: 1.1rem;
    transition: all 0.3s;
  }

  .answer-btn.correct {
    background: linear-gradient(135deg, #43e97b, #38f9d7) !important;
    border-color: #43e97b !important;
    color: #fff;
    animation: pulseGreen 0.6s ease-out;
    transform: none !important;
  }

  .answer-btn.correct .letter {
    background: rgba(255, 255, 255, 0.4);
  }

  .answer-btn.wrong {
    background: linear-gradient(135deg, #f5576c, #f093fb) !important;
    border-color: #f5576c !important;
    color: #fff;
    animation: shake 0.5s;
    transform: none !important;
  }

  .answer-btn.wrong .letter {
    background: rgba(255, 255, 255, 0.4);
  }

  .answer-btn:disabled {
    cursor: not-allowed;
  }

  .answer-btn:disabled:not(.correct):not(.wrong) {
    opacity: 0.5;
  }

  @keyframes pulseGreen {
    0% { box-shadow: 0 0 0 0 rgba(67, 233, 123, 0.7); }
    70% { box-shadow: 0 0 0 20px rgba(67, 233, 123, 0); }
    100% { box-shadow: 0 0 0 0 rgba(67, 233, 123, 0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }

  .status-message {
    text-align: center;
    margin: 20px 0;
    padding: 15px;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    display: none;
    animation: fadeIn 0.4s;
  }

  .status-message.show { display: block; }

  .status-message.success {
    background: rgba(67, 233, 123, 0.2);
    border: 2px solid rgba(67, 233, 123, 0.5);
  }

  .status-message.fail {
    background: rgba(245, 87, 108, 0.2);
    border: 2px solid rgba(245, 87, 108, 0.5);
  }

  .retry-btn {
    display: inline-block;
    margin-left: 15px;
    padding: 8px 20px;
    background: rgba(255, 255, 255, 0.3);
    border: 2px solid rgba(255, 255, 255, 0.5);
    color: #fff;
    border-radius: 25px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    transition: all 0.3s;
  }

  .retry-btn:hover {
    background: rgba(255, 255, 255, 0.5);
    transform: scale(1.05);
  }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.4s; }

  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 15px 20px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    font-size: 0.95rem;
  }

  .stats-bar span { font-weight: 600; }

  @media (max-width: 600px) {
    .container { padding: 25px 20px; }
    h1 { font-size: 1.8rem; }
    h2 { font-size: 1.5rem; }
    .question-text { font-size: 1.15rem; padding: 18px; }
    .answer-btn { padding: 15px 18px; font-size: 0.95rem; }
    .level-card { padding: 30px 20px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Экран 1: Выбор уровня -->
  <div id="screen-levels" class="screen active">
    <h1>✨ Ирина Одоевцева</h1>
    <p class="subtitle">Викторина о жизни и творчестве поэтессы Серебряного века</p>
    <div class="levels">
      <div class="level-card level-easy" onclick="selectLevel('easy')">
        <span class="emoji">🌱</span>
        <div class="level-name">Лёгкий</div>
        <div class="level-count">10 вопросов</div>
      </div>
      <div class="level-card level-medium" onclick="selectLevel('medium')">
        <span class="emoji">🔥</span>
        <div class="level-name">Средний</div>
        <div class="level-count">10 вопросов</div>
      </div>
      <div class="level-card level-hard" onclick="selectLevel('hard')">
        <span class="emoji">💎</span>
        <div class="level-name">Сложный</div>
        <div class="level-count">10 вопросов</div>
      </div>
    </div>
  </div>

  <!-- Экран 2: Список вопросов -->
  <div id="screen-questions" class="screen">
    <h2 id="level-title">Вопросы</h2>
    <div class="stats-bar">
      <div>✅ Правильно: <span id="stats-correct">0</span></div>
      <div>❌ Неправильно: <span id="stats-wrong">0</span></div>
      <div>⏱ Не отвечено: <span id="stats-remaining">10</span></div>
    </div>
    <div class="questions-grid" id="questions-grid"></div>
    <button class="back-btn" onclick="showScreen('screen-levels')">← Вернуться к выбору уровня</button>
  </div>

  <!-- Экран 3: Вопрос -->
  <div id="screen-quiz" class="screen">
    <div class="timer-container">
      <div class="timer-circle">
        <svg viewBox="0 0 100 100">
          <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
          <circle class="timer-progress" id="timer-progress" cx="50" cy="50" r="45"
                  stroke-dasharray="282.74" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-text" id="timer-text">15</div>
      </div>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="answers" id="answers"></div>
    <div class="status-message" id="status-message"></div>
    <button class="back-btn" onclick="showScreen('screen-questions')">← Вернуться к списку вопросов</button>
  </div>

</div>

<script>
// ===== ДАННЫЕ ВИКТОРИНЫ =====
const quizData = {
  easy: [
    { q: "Кто такая Ирина Одоевцева?", a: ["Русская балерина и актриса", "Русская художница-авангардистка", "Русская поэтесса и мемуаристка", "Русская певица"], correct: 2 },
    { q: "В какие годы жила Ирина Одоевцева?", a: ["1888–1950", "1890–1975", "1895–1990", "1901–1985"], correct: 2 },

    { q: "У какого известного поэта училась Одоевцева?", a: ["Александр Блок", "Николай Гумилёв", "Сергей Есенин", "Валерий Брюсов"], correct: 1 },
    { q: "В каком году она эмигрировала из России?", a: ["1918", "1920", "1922", "1931"], correct: 2 },

    { q: "Как называется её книга воспоминаний о литературной жизни Петербурга?", a: ["Тени Серебряного века", "На берегах Невы", "Петербургские годы", "Поэты Невы"], correct: 1 },
    { q: "Как называется книга о жизни русской эмиграции в Париже?", a: ["Русский Париж", "На берегах Сены", "Парижские воспоминания", "Вдали от России"], correct: 1 },
    { q: "Как звали мужа Одоевцевой?", a: ["Осип Мандельштам", "Александр Блок", "Георгий Иванов", "Иван Бунин"], correct: 2 },
    { q: "В каком городе она провела годы эмиграции?", a: ["Берлин", "Прага", "Париж", "Вена"], correct: 2 }
  ],
  medium: [
    { q: "Почему Одоевцева была вынуждена эмигрировать из России?", a: ["Из-за научной работы за границей", "Из-за семейных обстоятельств", "Из-за политических изменений после революции", "Из-за приглашения на преподавание"], correct: 2 },
    { q: "Какие события повлияли на судьбу её поколения?", a: ["Первая мировая война", "Революция 1917 года и гражданская война", "Крымская война", "Отечественная война 1812 года"], correct: 1 },
    { q: "Какие поэты появляются в книге «На берегах Невы»?", a: ["Лермонтов и Пушкин", "Блок, Мандельштам, Есенин", "Тютчев и Фет", "Некрасов и Жуковский"], correct: 1 },
    { q: "Какую атмосферу литературной жизни Петербурга передаёт книга?", a: ["Атмосферу строгой научной академии", "Атмосферу театральной сцены", "Живую атмосферу литературных встреч и поэтических кружков", "Атмосферу военных событий"], correct: 2 },
    { q: "О какой среде рассказывает книга «На берегах Сены»?", a: ["О жизни русской деревни", "О дореволюционной России", "О жизни русской эмиграции в Париже", "О жизни советских писателей"], correct: 2 },
    { q: "Какие особенности эмигрантской культуры показывает автор?", a: ["Полное исчезновение русской культуры", "Отсутствие литературной жизни", "Сохранение русской литературы и культурных традиций за границей", "Переход писателей в политику"], correct: 2 },
    { q: "Почему её воспоминания важны для истории Серебряного века?", a: ["Потому что они основаны на научных исследованиях", "Потому что это художественный роман", "Потому что автор лично знала многих поэтов эпохи", "Потому что это политический дневник"], correct: 2 },
    { q: "Какие художественные особенности характерны для её мемуаров?", a: ["Сложные философские трактаты", "Большое количество научных терминов", "Точность деталей, живые диалоги и лёгкая ирония", "Полное отсутствие описаний"], correct: 2 },
    { q: "Почему её воспоминания называют «кинематографичными»?", a: ["Потому что они написаны в стихах", "Потому что они короткие", "Потому что сцены описаны ярко и словно кадры фильма", "Потому что они предназначены для кино"], correct: 2 },
    { q: "Какую роль в её жизни сыграл Николай Гумилёв?", a: ["Был её мужем", "Был её братом", "Был её учителем и наставником", "Был её издателем"], correct: 2 }
  ],
  hard: [

    { q: "Как автор создаёт «эффект присутствия» в своих воспоминаниях?", a: ["Используя научные комментарии и документы", "Приводя статистику и факты", "Через диалоги, бытовые детали и яркие сценические эпизоды", "Через длинные философские размышления"], correct: 2 },

    { q: "Почему книги Одоевцевой можно рассматривать не только как мемуары?", a: ["Потому что они написаны в стихах", "Потому что это исторические документы", "Потому что в них создаются яркие литературные портреты писателей", "Потому что это научные исследования"], correct: 2 },
    { q: "Как автор сочетает личные воспоминания с историей эпохи?", a: ["Через официальные архивные документы", "Через научные исследования", "Через личные встречи, разговоры и наблюдения за известными людьми", "Через газетные статьи"], correct: 2 },
    { q: "Какую роль играют детали и бытовые сцены в её книгах?", a: ["Они служат только украшением текста", "Они используются случайно", "Они помогают создать живые и реалистичные образы людей", "Они заменяют сюжет"], correct: 2 },
    { q: "Почему Ирину Одоевцеву называют «последним свидетелем Серебряного века»?", a: ["Потому что она была последним поэтом своего времени", "Потому что она написала учебник по истории литературы", "Потому что она долго жила и лично знала многих поэтов Серебряного века", "Потому что она была единственным мемуаристом эпохи"], correct: 2 },
    { q: "Как мемуары Одоевцевой помогают понять судьбу русской культуры в эмиграции?", a: ["Они описывают только политические события", "Они рассказывают только о личной жизни автора", "Они показывают, как русская литературная культура продолжала существовать и развиваться за границей", "Они посвящены исключительно французской культуре"], correct: 2 }
  ]
};

const levelTitles = {
  easy: '🌱 Лёгкий уровень',
  medium: '🔥 Средний уровень',
  hard: '💎 Сложный уровень'
};

// ===== СОСТОЯНИЕ =====
let currentLevel = null;
let currentQuestionIdx = null;
let timerInterval = null;
let answered = false;
// Храним статус каждого вопроса: { easy: { 0: 'correct' | 'wrong' | 'timeout', ... }, ... }
const questionStatus = { easy: {}, medium: {}, hard: {} };

// ===== НАВИГАЦИЯ =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id !== 'screen-quiz') stopTimer();
  // Обновляем сетку и статистику каждый раз при возврате к списку вопросов
  if (id === 'screen-questions' && currentLevel) {
    renderQuestionsGrid();
  }
}

function selectLevel(level) {
  currentLevel = level;
  document.getElementById('level-title').textContent = levelTitles[level];
  renderQuestionsGrid();
  showScreen('screen-questions');
}

// ===== СЕТКА ВОПРОСОВ =====
function renderQuestionsGrid() {
  const grid = document.getElementById('questions-grid');
  grid.innerHTML = '';
  const questions = quizData[currentLevel];
  const offset = currentLevel === 'easy' ? 0 : currentLevel === 'medium' ? 10 : 20;

  let correctCount = 0, wrongCount = 0;
  questions.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'question-btn';
    btn.textContent = offset + i + 1;
    btn.onclick = () => openQuestion(i);

    const status = questionStatus[currentLevel][i];
    if (status === 'correct') {
      btn.classList.add('answered-correct');
      btn.innerHTML = (offset + i + 1) + '<span class="check-mark">✓</span>';
      correctCount++;
    } else if (status === 'wrong') {
      btn.classList.add('answered-wrong');
      btn.innerHTML = (offset + i + 1) + '<span class="check-mark">✗</span>';
      wrongCount++;
    } else if (status === 'timeout') {
      btn.classList.add('answered-timeout');
      btn.innerHTML = (offset + i + 1) + '<span class="check-mark">⏱</span>';
      wrongCount++;
    }

    grid.appendChild(btn);
  });

  document.getElementById('stats-correct').textContent = correctCount;
  document.getElementById('stats-wrong').textContent = wrongCount;
  document.getElementById('stats-remaining').textContent = 10 - correctCount - wrongCount;
}

// ===== ВОПРОС =====
function openQuestion(idx) {
  currentQuestionIdx = idx;
  const q = quizData[currentLevel][idx];
  document.getElementById('question-text').textContent = q.q;

  renderAnswers(q);
  hideStatusMessage();
  showScreen('screen-quiz');
  startTimer(15);
}

function renderAnswers(q) {
  const container = document.getElementById('answers');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.a.forEach((answer, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${answer}</span>`;
    btn.onclick = () => handleAnswer(i);
    container.appendChild(btn);
  });
  answered = false;
}

function handleAnswer(chosenIdx) {
  if (answered) return;
  answered = true;

  const q = quizData[currentLevel][currentQuestionIdx];
  const buttons = document.querySelectorAll('.answer-btn');
  const correctIdx = q.correct;

  stopTimer();

  if (chosenIdx === correctIdx) {
    buttons[chosenIdx].classList.add('correct');
    questionStatus[currentLevel][currentQuestionIdx] = 'correct';
    showStatusMessage('🎉 Правильно! Молодец!', 'success');
  } else {
    buttons[chosenIdx].classList.add('wrong');
    buttons[correctIdx].classList.add('correct');
    questionStatus[currentLevel][currentQuestionIdx] = 'wrong';
    showStatusMessage('😔 Неверно. Правильный ответ подсвечен зелёным.', 'fail', true);
  }

  buttons.forEach(b => b.disabled = true);
}

function handleTimeout() {
  if (answered) return;
  answered = true;

  const q = quizData[currentLevel][currentQuestionIdx];
  const buttons = document.querySelectorAll('.answer-btn');
  buttons[q.correct].classList.add('correct');
  buttons.forEach(b => b.disabled = true);

  // Отмечаем только если ещё не был правильно отвечен
  if (questionStatus[currentLevel][currentQuestionIdx] !== 'correct') {
    questionStatus[currentLevel][currentQuestionIdx] = 'timeout';
  }
  showStatusMessage('⏱ Время вышло! Правильный ответ подсвечен.', 'fail', true);
}

function showStatusMessage(text, type, withRetry = false) {
  const msg = document.getElementById('status-message');
  msg.className = `status-message show ${type}`;
  msg.innerHTML = text + (withRetry ? '<button class="retry-btn" onclick="retryQuestion()">🔄 Попробовать ещё раз</button>' : '');
}

function hideStatusMessage() {
  document.getElementById('status-message').className = 'status-message';
}

function retryQuestion() {
  openQuestion(currentQuestionIdx);
}

// ===== ТАЙМЕР =====
function startTimer(seconds) {
  const timerText = document.getElementById('timer-text');
  const timerProgress = document.getElementById('timer-progress');
  const circumference = 2 * Math.PI * 45;

  let remaining = seconds;
  timerText.textContent = remaining;
  timerProgress.style.strokeDashoffset = 0;
  timerProgress.classList.remove('warning', 'danger');

  timerProgress.style.transition = 'none';
  timerProgress.getBoundingClientRect();
  timerProgress.style.transition = 'stroke-dashoffset 1s linear, stroke 0.3s';

  timerInterval = setInterval(() => {
    remaining--;
    timerText.textContent = remaining;
    const offset = circumference * (1 - remaining / seconds);
    timerProgress.style.strokeDashoffset = offset;

    if (remaining <= 5) timerProgress.classList.add('danger');
    else if (remaining <= 10) timerProgress.classList.add('warning');

    if (remaining <= 0) {
      stopTimer();
      handleTimeout();
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}
</script>
